<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="orb1" cx="15%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="85%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#8750ff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#8750ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#00c8ff"/>
      <stop offset="100%" stop-color="#8750ff"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#8750ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8750ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ringGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8750ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8750ff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="ringGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="orbblur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <clipPath id="card">
      <rect width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#08080e"/>

  <!-- Ambient orbs -->
  <ellipse cx="180" cy="190" rx="420" ry="420" fill="url(#orb1)" filter="url(#orbblur)"/>
  <ellipse cx="1020" cy="440" rx="380" ry="380" fill="url(#orb2)" filter="url(#orbblur)"/>
  <ellipse cx="600" cy="315" rx="280" ry="280" fill="url(#orb3)" filter="url(#orbblur)"/>

  <!-- Subtle grid lines -->
  <g stroke="#26263c" stroke-width="1" opacity="0.35">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Portal rings — right side -->
  <!-- Outermost ring -->
  <circle cx="920" cy="315" r="210" fill="none" stroke="url(#ringGrad1)" stroke-width="1" opacity="0.55"/>
  <!-- Second ring -->
  <circle cx="920" cy="315" r="170" fill="none" stroke="url(#ringGrad2)" stroke-width="1.2" opacity="0.65"/>
  <!-- Third ring -->
  <circle cx="920" cy="315" r="128" fill="none" stroke="url(#ringGrad3)" stroke-width="1.5" opacity="0.8"/>
  <!-- Fourth ring -->
  <circle cx="920" cy="315" r="88" fill="none" stroke="#00c8ff" stroke-width="1" opacity="0.35"/>

  <!-- Portal glow halo -->
  <circle cx="920" cy="315" r="148" fill="none" stroke="#00c8ff" stroke-width="30" opacity="0.04"/>

  <!-- Portal center sphere -->
  <radialGradient id="sphereGrad" cx="38%" cy="32%" r="62%">
    <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.45"/>
    <stop offset="50%" stop-color="#0e0e1a" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#08080e" stop-opacity="1"/>
  </radialGradient>
  <circle cx="920" cy="315" r="60" fill="url(#sphereGrad)" stroke="#00c8ff" stroke-width="1.2" stroke-opacity="0.4" filter="url(#softglow)"/>

  <!-- Portal center symbol -->
  <!-- ◈ approximated as overlapping squares rotated 45° -->
  <g transform="translate(920,315)" filter="url(#glow)">
    <rect x="-16" y="-16" width="32" height="32" rx="3" fill="none" stroke="#00c8ff" stroke-width="2" opacity="0.9" transform="rotate(0)"/>
    <rect x="-13" y="-13" width="26" height="26" rx="2" fill="none" stroke="#8750ff" stroke-width="1.5" opacity="0.7" transform="rotate(45)"/>
    <circle cx="0" cy="0" r="4" fill="#00c8ff" opacity="0.95"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentLine)"/>

  <!-- Left content block -->
  <!-- Brand badge -->
  <rect x="72" y="88" width="168" height="28" rx="14" fill="#00c8ff" fill-opacity="0.08" stroke="#00c8ff" stroke-width="1" stroke-opacity="0.28"/>
  <circle cx="93" cy="102" r="4" fill="#00c8ff" opacity="0.9"/>
  <text x="104" y="107" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="700" fill="#00c8ff" letter-spacing="2.5" opacity="0.9">v0.1.0 — LIVE</text>

  <!-- Main title -->
  <text x="68" y="218" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="110" font-weight="900" fill="url(#titleGrad)" letter-spacing="-4" filter="url(#softglow)">THE</text>
  <text x="68" y="338" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="110" font-weight="900" fill="url(#titleGrad)" letter-spacing="-4" filter="url(#softglow)">RIFT</text>

  <!-- Byline -->
  <text x="72" y="378" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" font-weight="400" fill="#58687e" letter-spacing="5" opacity="0.6">BY ABYSSPROTOCOL</text>

  <!-- Divider -->
  <rect x="68" y="402" width="440" height="1" fill="url(#accentLine)" opacity="0.4"/>

  <!-- Feature pills row 1 -->
  <!-- No internet -->
  <rect x="68" y="424" width="142" height="30" rx="15" fill="#14142a" stroke="#26263c" stroke-width="1"/>
  <text x="88" y="443" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="700" fill="#00c8ff" letter-spacing="1">NO INTERNET</text>

  <!-- No cloud -->
  <rect x="220" y="424" width="114" height="30" rx="15" fill="#14142a" stroke="#26263c" stroke-width="1"/>
  <text x="240" y="443" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="700" fill="#8750ff" letter-spacing="1">NO CLOUD</text>

  <!-- No account -->
  <rect x="344" y="424" width="124" height="30" rx="15" fill="#14142a" stroke="#26263c" stroke-width="1"/>
  <text x="362" y="443" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="700" fill="#22c55e" letter-spacing="1">NO LIMITS</text>

  <!-- Feature pills row 2 -->
  <!-- Dual stream -->
  <rect x="68" y="466" width="160" height="30" rx="15" fill="#14142a" stroke="#26263c" stroke-width="1"/>
  <text x="88" y="485" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="700" fill="#58687e" letter-spacing="1">DUAL STREAM TCP</text>

  <!-- SHA256 -->
  <rect x="238" y="466" width="152" height="30" rx="15" fill="#14142a" stroke="#26263c" stroke-width="1"/>
  <text x="258" y="485" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="700" fill="#58687e" letter-spacing="1">BLAKE3 VERIFIED</text>

  <!-- Tagline -->
  <text x="72" y="548" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="15" font-weight="400" fill="#e1e8f2" opacity="0.55" letter-spacing="0.5">Direct device-to-device file transfer.</text>
  <text x="72" y="572" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="15" font-weight="400" fill="#e1e8f2" opacity="0.55" letter-spacing="0.5">Windows · macOS · Linux · Android</text>

  <!-- Bottom right — subtle URL -->
  <text x="1132" y="610" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="400" fill="#58687e" opacity="0.4" text-anchor="end" letter-spacing="1">github.com/Ultim8-netizen/The-rift</text>
</svg>